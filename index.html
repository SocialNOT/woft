
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>World of Texts | Mastery Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-canvas: #ffffff;
            --bg-card: #ffffff;
            --bg-secondary: #fafafa;
            --bg-accent: #f0f9ff;
            --text-primary: #000000;
            --text-secondary: #64748b;
            --border-primary: #000000;
            --accent: #0ea5e9;
            --font-main: 'Inter', sans-serif;
            --shadow-color: rgba(0,0,0,0.1);
        }

        .dark-mode {
            --bg-canvas: #121212;
            --bg-card: #1e1e1e;
            --bg-secondary: #18181b;
            --bg-accent: #0c4a6e;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border-primary: #ffffff;
            --shadow-color: rgba(255,255,255,0.05);
        }

        body, html { 
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            background: var(--bg-secondary);
            font-family: var(--font-main);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            display: flex; justify-content: center; align-items: center;
        }

        #root {
            width: 100%;
            max-width: 480px;
            height: 100%;
            background: var(--bg-canvas);
            display: flex; flex-direction: column;
            position: relative;
            box-shadow: 0 0 80px var(--shadow-color);
            border-left: 2px solid var(--border-primary);
            border-right: 2px solid var(--border-primary);
            overflow: hidden;
            transition: max-width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s ease, border-color 0.3s ease;
        }

        .focus-mode #root { max-width: 600px; border: none; }

        .header-top { flex-shrink: 0; padding: 12px 16px; background: var(--bg-canvas); z-index: 20; border-bottom: 2px solid var(--border-primary); }
        .config-area { flex-shrink: 0; background: var(--bg-canvas); z-index: 15; }
        .main-canvas { flex-grow: 1; flex-shrink: 1; min-height: 0; overflow-y: auto; background: var(--bg-canvas); position: relative; scroll-behavior: smooth; }
        .terminal-block { flex-shrink: 0; padding: 0 16px 16px 16px; background: var(--bg-canvas); border-top: 2px solid var(--border-primary); z-index: 20; }

        .nexus-label { color: var(--accent); font-size: 9px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; }
        .logo-text { font-size: 20px; font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1; margin-top: 2px; color: var(--text-primary); }
        
        .nav-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px; }
        .nav-btn { padding: 8px; border-radius: 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.2s; border: 2px solid var(--border-primary); text-align: center; }
        .btn-dark { background: var(--text-primary); color: var(--bg-canvas); border-color: var(--border-primary); }
        .btn-light { background: var(--bg-canvas); color: var(--text-primary); }

        .registry-bar { display: grid; grid-template-columns: 1fr 1fr; background: var(--bg-canvas); border-bottom: 2px solid var(--border-primary); }
        .reg-item { padding: 10px; border-right: 2px solid var(--border-primary); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .reg-item:last-child { border-right: none; }
        .reg-label { font-size: 8px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1px; }
        .reg-value { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.02em; text-align: center; color: var(--text-primary); }

        .toggle-divider { position: relative; height: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .toggle-divider::before { content: ""; position: absolute; left: 0; right: 0; height: 2px; background: var(--border-primary); z-index: 0; }
        .toggle-circle { position: relative; z-index: 1; width: 32px; height: 32px; background: var(--bg-canvas); border: 2px solid var(--border-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: transform 0.3s ease, background-color 0.3s ease; box-shadow: 4px 4px 0 var(--shadow-color); font-weight: 900; color: var(--text-primary); }
        .toggle-circle.rotated { transform: rotate(180deg); }

        .tool-grid-main { display: grid; grid-template-columns: repeat(5, 1fr); border: 2px solid var(--border-primary); border-radius: 12px; background: var(--bg-canvas); overflow: hidden; margin-bottom: 12px; }
        .tool-btn-main { padding: 10px 0; display: flex; flex-direction: column; align-items: center; gap: 2px; border-right: 2px solid var(--border-primary); transition: all 0.2s; cursor: pointer; color: var(--text-primary); font-weight: 900; }
        .tool-btn-main:last-child { border-right: none; }
        .tool-btn-main.active { background: var(--text-primary); color: var(--bg-canvas); border-right-color: var(--border-primary); }
        
        .console-box { border: 2px solid var(--border-primary); border-radius: 24px; padding: 6px 14px; display: flex; align-items: center; gap: 8px; background: var(--bg-canvas); }
        .send-btn { width: 36px; height: 36px; background: var(--text-primary); color: var(--bg-canvas); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.2s; }
        .send-btn:hover { transform: scale(1.1); }

        .message-card { width: 100%; max-width: 95%; border: 2px solid var(--border-primary); border-radius: 16px; overflow: hidden; background: var(--bg-card); box-shadow: 6px 6px 0 var(--shadow-color); margin-bottom: 24px; position: relative; transition: background-color 0.3s ease, border-color 0.3s ease; }
        .user-card { align-self: flex-end; background: var(--text-primary); color: var(--bg-canvas); border-color: var(--border-primary); }
        .model-card { align-self: flex-start; color: var(--text-primary); }
        
        .card-header { padding: 12px 14px; background: var(--bg-card); border-bottom: 2px solid var(--border-primary); display: flex; flex-direction: column; gap: 8px; }
        .user-card .card-header { background: var(--text-primary); color: var(--bg-canvas); border-bottom: 2px solid var(--text-secondary); }
        .card-body { padding: 18px; font-size: 15px; line-height: 1.6; color: var(--text-primary); font-weight: 500; }
        
        .output-tool-grid { display: grid; grid-template-columns: repeat(5, 1fr); border-top: 2px solid var(--border-primary); background: var(--bg-card); }
        .output-tool-btn { padding: 12px 0; border-right: 2px solid var(--border-primary); display: flex; align-items: center; justify-content: center; font-size: 18px; transition: background 0.2s; color: var(--text-primary); }
        .output-tool-btn:last-child { border-right: none; }
        .output-tool-btn:hover { background: var(--bg-accent); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        .branch-badge {
            background: var(--text-primary);
            color: var(--bg-canvas);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-flex;
            flex-direction: column;
            line-height: 1.1;
            align-items: center;
            justify-content: center;
        }

        .view-dna-btn {
            border: 2.5px solid var(--border-primary);
            background: var(--bg-canvas);
            color: var(--text-primary);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.1;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, background 0.2s;
        }
        .view-dna-btn:active { transform: scale(0.95); }
        .view-dna-btn:hover { background: var(--bg-secondary); }

        .splash-wrapper {
            position: absolute;
            inset: 0;
            background: var(--bg-canvas);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            text-align: center;
            overflow: hidden; 
        }

        .word-reveal { 
            display: inline-block; 
            min-height: 1.2em;
            position: relative;
            vertical-align: top;
            color: var(--accent);
        }

        .splash-btn {
            width: 100%;
            max-width: 320px;
            padding: 1.25rem;
            background: var(--text-primary);
            color: var(--bg-canvas);
            border: 3px solid var(--border-primary);
            border-radius: 20px;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            box-shadow: 8px 8px 0 rgba(14, 165, 233, 0.4);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        .splash-btn:hover { transform: translateY(-3px); box-shadow: 10px 10px 0 rgba(14, 165, 233, 0.4); }
        .splash-btn:active { transform: translateY(2px); box-shadow: 4px 4px 0 rgba(14, 165, 233, 0.4); }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 15s linear infinite;
        }

        /* Tooltip Style Enhancement */
        [title] {
            cursor: help;
        }

        @media (max-height: 700px) {
            .splash-wrapper { padding: 1rem; }
            .splash-title h1 { font-size: 42px !important; }
            .splash-hook { margin-bottom: 1rem !important; }
            .splash-hook p { font-size: 14px !important; }
            .splash-notif-pill { padding: 0.5rem 1rem !important; margin-bottom: 1.5rem !important; }
            .splash-tier-card { padding: 1rem !important; margin-bottom: 1.5rem !important; }
        }
    </style>
